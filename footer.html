<!DOCTYPE html>
<html lang="es">

<head>
  <script src="/assets/js/navbar.js" defer></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Footer</title>

<style>
/* =========================
   FOOTER
body{
  margin:0;
  background:#ffffff;
    font-family: Arial, sans-serif;
}

/* =========================
   NAV
.bottom-nav{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 24px);
  max-width:420px;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#ffffff;
  border-radius:18px;
  
  font-family: 'Liberation Sans', sans-serif , monospace;
}

/* =========================
   ITEM
.tab{
  flex:1;

  display:flex;
  flex-direction:column;
  align-items:center;

  border:none;
  background:transparent;

  font-size:10px;
  color:#A16207;
}

/* =========================
   ICON (FORZADO VISIBLE)
.icon{
  width:28px;
  height:28px;

  fill:#3D3905;   /* IMPORTANTE: ahora es fill, no stroke */
}

/* active */
.tab.active .icon{
  fill:#0068A8;
}
</style>

<link rel="stylesheet" href="/css/footer.css">
</head>

<body>
<!---   INICIO FOOTER ---->
<nav class="bottom-nav">

  <button class="tab active">
    <a href="#">
    <img src="/assets/icons/home.svg" alt="home"></a>
  </button>

  <button class="tab"><a href="/pages/catalogo-productos/">
    <img src="/assets/icons/shop.svg" alt="shop"></a>
  </button>

  <button class="tab"><a href="/pages/contacto/">
    <img src="/assets/icons/contacto.svg" alt="contacto"></a>
  </button>

</nav>
<!---   TERMINA EL FOOTER ---->
</body>

</html>
