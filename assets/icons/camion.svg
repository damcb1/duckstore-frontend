  <!-- Ruedas -->
  <circle cx="44" cy="82" r="8" fill="#ffffff"/>
  <circle cx="44" cy="82" r="4" fill="#2F80ED"/>

  <circle cx="84" cy="82" r="8" fill="#ffffff"/>
  <circle cx="84" cy="82" r="4" fill="#2F80ED"/>

