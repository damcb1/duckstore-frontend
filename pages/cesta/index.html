<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Quack & Splash</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/pages/cesta/css/style.css">
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <!-- AÑADIR NAVBAR -->
    </header>

    <!-- MAIN -->
    <main class="cart-container">

      <div class="cart-eyebrow">Your Premium Selection</div>

      <div class="cart-header-row">
        <h1>Your Cart</h1>
        <span class="items-count">OBJECTS OF JOY</span>
      </div>

      <!-- GRID: items + summary -->
      <section class="cart-layout" aria-label="Shopping cart layout">

        <!-- CART ITEMS -->
        <div class="cart-items" aria-label="Cart items">

          <article class="cart-item">
            <span class="editor-badge">Editor's Pick</span>
            <img src="/assets/images/Admiral-duck.png" alt="The Admiral Duck">

            <div class="item-body">
              <h3>The Admiral Duck</h3>
              <p class="item-series">The Voyager Series</p>

              <div class="quantity">
                <button class="qty-btn" aria-label="Decrease quantity">−</button>
                <span class="qty-value">1</span>
                <button class="qty-btn" aria-label="Increase quantity">+</button>
                <button class="delete-btn" aria-label="Remove item">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                    <path d="M1 3h12M5 3V2a1 1 0 011-1h2a1 1 0 011 1v1M11 3l-.7 8.1a1 1 0 01-1 .9H4.7a1 1 0 01-1-.9L3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>

            <span class="item-price">€55.00</span>
          </article>

        </div>

        <!-- ORDER SUMMARY -->
        <aside class="order-summary" aria-label="Order summary">

          <h2>Order Summary</h2>

          <div class="summary-rows">
            <div class="summary-row">
              <span>Subtotal</span>
              <span>€55.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>€4.90</span>
            </div>
          </div>

          <div class="summary-total">
            <span>Total</span>
            <span>€59.90</span>
          </div>

          <button class="checkout-btn">CHECKOUT</button>
          <button class="continue-btn">CONTINUE SHOPPING</button>

          <div class="badges">
            <span class="badge-item">
              <img src="/assets/icons/safe-sum-card.svg" alt="" aria-hidden="true" class="badge-icon">
              Secure
            </span>
            <span class="badge-item">
              <img src="/assets/icons/shipping-sum-card.svg" alt="" aria-hidden="true" class="badge-icon">
              Fast
            </span>
            <span class="badge-item">
              <img src="/assets/icons/eco-sum-card.svg" alt="" aria-hidden="true" class="badge-icon">
              Eco
            </span>
          </div>

        </aside>

      </section>

      <!-- ECO BOX (fuera del grid) -->
      <div class="eco-box" aria-label="Sustainability info">
        <div class="eco-icon">
          <img src="/assets/icons/eco-safe.svg" alt="" aria-hidden="true">
        </div>
        <div class="eco-text">
          <p>100% Recyclable PVC-Free</p>
          <small>Every duck contributes to ocean cleanup initiatives.</small>
        </div>
      </div>

    </main>

    <!-- FOOTER -->
    <footer>
      <!-- AÑADIR FOOTER -->
    </footer>

  </body>
</html>
