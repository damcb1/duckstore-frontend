<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Duck Gallery - Quack & Splash</title>

    <!--Fuentes: Plus Jakarta Sans + Be Vietnam Pro-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;1,700&family=Be+Vietnam+Pro:wght@400;500&display=swap" rel="stylesheet" />
   
    <link rel="stylesheet" href="style.css" />
    </head>

<body>
    <!--HEADER-->

    <!--MAIN: Galería de productos-->

    <main class="gallery-page">
        <section class="gallery-header">
            <p class="gallery-header-label">Curated Collection</p>
            <h1 class="gallery-header-title">The Duck<br /><em>Gallery</em></h1>
        </section>

        <article class="card card-featured">
        <span class="card-badge">Limited Edition</span>

        <div class="card-featured-info">
            <h2 class="card-featured-name">Golden<br />Ducky</h2>
            <p class="card-featured-desc">24k Matte Finish Premium Collector's Piece. A masterpiece of craftmanship for the discerning enthusiast.</p>
            <p class="card-featured-price">€124.00</p>
        </div>

        <div class="card-featured-img-wrap">
            <img src="../../assets/images/Golden-rubber-duck.svg" alt="Golden Ducky - edición limitada" class="card-img"/>
        </div>
        </article>
    </main>
    
</body>
</html>
