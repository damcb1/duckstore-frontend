<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Duck Gallery - Quack & Splash</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<!-- HEADER -->
<header id="header"></header>

<script>
  fetch('../../header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;
    });
</script>

<div class="page-content">

<main class="gallery-page">

  <!-- HEADER -->
  <section class="gallery-header">
    <p class="gallery-header-label">Curated Collection</p>
    <h1 class="gallery-header-title">The Duck <em>Gallery</em></h1>
  </section>

  <!-- FILTER -->
  <div class="filters">
    <button class="filter-btn" id="filterBtn">
      <img src="../../assets/icons/filter.svg" class="filter-icon" alt="filter icon"/>
      Filter
    </button>

    <div class="filter-menu hidden" id="filterMenu">
      <button data-category="all">All</button>
      <button data-category="voyager">Voyager</button>
      <button data-category="creative">Creative</button>
      <button data-category="amazing">Amazing</button>
    </div>
  </div>

  <!-- FEATURED -->
  <article class="card card-featured">

    <span class="card-badge">Limited Edition</span>

    <div class="card-featured-info">

      <h2 class="card-featured-name">Golden Ducky</h2>

      <p class="card-featured-desc">
        24k Matte Finish Premium Collector's Piece.
        A masterpiece of craftsmanship for the discerning enthusiast.
      </p>

      <!-- 🔥 BLOCO CORRIGIDO -->
      <div class="price-buy-wrapper">

        <span class="card-featured-price">€124.00</span>

        <!-- ⚠️ AGORA USA A CLASSE CERTA -->
        <a href="../product-page/index.html" class="buy-btn">
          Buy Golden Duck
        </a>

      </div>

    </div>

    <div class="card-featured-img-wrap">
      <a href="../product-page/index.html">
        <img 
          src="../../assets/images/Golden-rubber-duck.png" 
          class="card-img"
          alt="Golden Duck"
        />
      </a>
    </div>

  </article>

  <!-- GRID -->
  <section class="product-grid" id="product-grid"></section>

</main>

</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<script>
  fetch('../../footer.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('footer').innerHTML = data;
    });
</script>

<script type="module" src="../../src/components/catalog/render-catalog.js"></script>
<script type="module" src="../../src/components/catalog/filter-catalog.js"></script>

</body>
</html>
