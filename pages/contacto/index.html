<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duck Contact</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="page">

  <section class="hero">

    <p class="label">GET IN TOUCH</p>
    <h1 >Talk to the Ducks</h1>

    <p class="desc">
      Have a question about our premium rubber duck collections?
      Whether it's a wholesale inquiry or just to say quack,
      we're all ears (and wings).
    </p>

    <div class="duck-card">
      <img src="../../assets/images/premium-rubber-duck.png" alt="duck">
      <div class="circle"></div>
    </div>

    <form class="form">
      <label>Name</label>
      <input type="text" placeholder="Waddle Duckington">

      <label>Email</label>
      <input type="email" placeholder="quack@splash.com">

      <label>Message</label>
      <textarea placeholder="Tell us what's on your beak..."></textarea>

      <button>Send a Quack ➤</button>
    </form>

    <div class="location">
      <h3>📍 Duck Pond HQ</h3>
      <div class="map"></div>
      <p>123 Quackery Lane, Splashville 10001</p>
    </div>

    <div class="social">
      <h3>Connect with the flock</h3>
      <div class="icons">
        <div>📘</div>
        <div>📸</div>
        <div>📍</div>
        <div>▶️</div>
      </div>
      <p>🕒 Mon - Fri, 9am - 5pm Quacc Time</p>
    </div>

  </section>

</div>

</body>
</html>
